<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>자동차보험 | DB손해보험</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
  font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;
  background:#E8E4DA;
  -webkit-font-smoothing:antialiased;
  letter-spacing:-0.02em;
}
button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
button:active { transform:scale(0.98); }

/* Frame */
.desktop-frame {
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  padding:24px;
  background:radial-gradient(ellipse at top, #F0ECE2, #DCD7CB);
}
.phone {
  width:100%; max-width:400px;
  height:min(860px, calc(100vh - 48px));
  border-radius:44px;
  box-shadow:0 0 0 10px #1a1a1a, 0 0 0 12px #2a2a2a, 0 40px 80px -20px rgba(0,0,0,0.35);
  overflow:hidden;
  position:relative;
  display:flex;
  flex-direction:column;
  background:#fff;
}
@media (max-width:480px) {
  .desktop-frame { padding:0; }
  .phone { max-width:100%; height:100vh; border-radius:0; box-shadow:none; }
}
.phone::before {
  content:'';
  position:absolute; top:12px; left:50%; transform:translateX(-50%);
  width:110px; height:28px;
  background:#1a1a1a; border-radius:20px; z-index:100;
}
@media (max-width:480px) { .phone::before { display:none; } }

/* 배경 이미지 스크롤 영역 */
.page-bg {
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  position:relative;
}
.page-img {
  width:100%;
  display:block;
  object-fit:cover;
}

/* 상단 토글 시뮬레이터 */
.demo-bar {
  position:absolute;
  top:14px; left:0; right:0;
  z-index:300;
  padding:0 12px;
}
.demo-inner {
  background:rgba(10,10,10,0.92);
  border-radius:12px;
  padding:8px 10px;
  backdrop-filter:blur(20px);
}
.demo-label {
  font-size:9px;
  font-weight:800;
  color:#00E5A0;
  letter-spacing:0.06em;
  margin-bottom:6px;
  display:flex;
  align-items:center;
  gap:4px;
}
.demo-dot {
  width:5px; height:5px;
  background:#00E5A0;
  border-radius:50%;
  animation:pulse 1.8s infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.4; transform:scale(1.4); }
}
.demo-btns {
  display:flex; gap:5px;
}
.demo-btn {
  flex:1;
  padding:7px 4px;
  border-radius:7px;
  font-size:10px;
  font-weight:800;
  text-align:center;
  background:rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.6);
  border:none; cursor:pointer;
  line-height:1.3;
  font-family:inherit;
  transition:all 0.2s;
}
.demo-btn.active {
  background:white;
  color:#0A0A0A;
}

/* ===== BOTTOM SHEET ===== */
.bs-overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0);
  z-index:200;
  pointer-events:none;
  transition:background 0.4s, backdrop-filter 0.4s;
}
.bs-overlay.active {
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(3px);
  pointer-events:all;
}
.bs-sheet {
  position:absolute;
  bottom:0; left:0; right:0;
  background:white;
  border-radius:26px 26px 0 0;
  transform:translateY(100%);
  transition:transform 0.45s cubic-bezier(0.2,0,0,1);
  box-shadow:0 -20px 60px rgba(0,0,0,0.2);
  overflow:hidden;
  padding-bottom:calc(env(safe-area-inset-bottom,0) + 6px);
}
.bs-overlay.active .bs-sheet {
  transform:translateY(0);
}
.bs-handle {
  width:40px; height:4px;
  background:rgba(0,0,0,0.12);
  border-radius:10px;
  margin:10px auto 0;
}

/* 공통 바텀시트 내부 */
.bs-body { padding:20px 20px 8px; }

.bs-header {
  display:flex; align-items:center; gap:10px; margin-bottom:16px;
}
.bs-icon {
  width:44px; height:44px;
  border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-size:22px; flex-shrink:0;
}
.bs-tag {
  font-size:10px; font-weight:800;
  padding:3px 8px; border-radius:100px;
  display:inline-block; margin-bottom:4px; letter-spacing:0.03em;
}
.bs-title {
  font-size:19px; font-weight:900;
  letter-spacing:-0.025em; line-height:1.25; color:#0A0A0A;
}
.bs-desc {
  font-size:13px; color:#6B6B6B; font-weight:500;
  line-height:1.6; margin-bottom:20px; padding-left:54px;
}
.bs-btn-main {
  width:100%; padding:17px;
  color:white; border-radius:14px;
  font-size:15px; font-weight:900;
  border:none; cursor:pointer; font-family:inherit;
  margin-bottom:8px;
}
.bs-btn-sub {
  width:100%; padding:13px;
  background:#F5F2EB; color:#0A0A0A;
  border-radius:12px; font-size:13px; font-weight:800;
  border:none; cursor:pointer; font-family:inherit;
  margin-bottom:8px;
}
.bs-skip {
  width:100%; padding:12px;
  font-size:12px; font-weight:700; color:#9B9B9B;
  text-align:center; text-decoration:underline;
  text-underline-offset:2px;
  background:none; border:none; cursor:pointer; font-family:inherit;
}

/* 시니어 체크 아이템 */
.bs-check-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:10px;
  border-left:3px solid; margin-bottom:6px;
}
.bs-check-item:last-child { margin-bottom:0; }
.bs-check-badge {
  font-size:10px; font-weight:800;
  background:white; border:1.5px solid;
  border-radius:5px; padding:2px 7px;
}

/* 화상 특징 그리드 */
.bs-feat-grid {
  display:flex; gap:8px; margin-bottom:18px;
}
.bs-feat-item {
  flex:1; padding:12px 8px;
  border-radius:12px; text-align:center;
}
.bs-feat-emoji { font-size:22px; margin-bottom:4px; }
.bs-feat-label { font-size:11px; font-weight:800; line-height:1.3; }

/* 홈 옵션 리스트 */
.bs-option {
  display:flex; align-items:center; gap:12px;
  padding:14px; border-radius:14px;
  border:2px solid rgba(0,0,0,0.06);
  background:white; text-align:left;
  cursor:pointer; font-family:inherit;
  margin-bottom:8px; width:100%;
}
.bs-option-icon {
  width:38px; height:38px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; flex-shrink:0;
}
.bs-option-title { font-size:14px; font-weight:800; color:#0A0A0A; margin-bottom:2px; }
.bs-option-desc { font-size:11px; color:#9B9B9B; font-weight:600; }
.bs-option-arrow { font-size:16px; color:#C4C4C4; margin-left:auto; }

/* Toast */
.toast {
  position:absolute; top:70px; left:50%;
  transform:translate(-50%,-10px);
  background:#004940; color:white;
  padding:10px 18px; border-radius:100px;
  font-size:13px; font-weight:700;
  z-index:500; opacity:0;
  transition:all 0.35s cubic-bezier(0.2,0,0,1);
  pointer-events:none; white-space:nowrap;
}
.toast.show { opacity:1; transform:translate(-50%,0); }

.dev-note {
  position:fixed; bottom:16px; left:16px;
  background:rgba(10,10,10,0.9); color:white;
  font-size:11px; padding:8px 12px; border-radius:8px;
  z-index:1000; font-weight:600;
  backdrop-filter:blur(10px); line-height:1.5;
}
.dev-note small { color:#00E5A0; font-weight:700; }
@media (max-width:480px) { .dev-note { display:none; } }
</style>
</head>

<script>
const MODES = ['recommend','senior','video','default'];

function setMode(mode) {
  MODES.forEach((m,i) => {
    const btn = document.getElementById('dBtn'+i);
    btn.classList.toggle('active', m===mode);
  });
  ['bsRecommend','bsSenior','bsVideo','bsDefault'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  const map = {recommend:'bsRecommend',senior:'bsSenior',video:'bsVideo',default:'bsDefault'};
  document.getElementById(map[mode]).style.display = 'block';
  document.getElementById('bsOverlay').classList.add('active');
}

function closeBS() {
  document.getElementById('bsOverlay').classList.remove('active');
}

window.addEventListener('DOMContentLoaded', () => {
  // 1.5초 후 추천 바텀시트 자동 노출
  setTimeout(() => setMode('recommend'), 1500);

  const overlay = document.getElementById('bsOverlay');
  let ty = 0;
  overlay.addEventListener('touchstart', e => { ty = e.touches[0].clientY; }, {passive:true});
  overlay.addEventListener('touchmove', e => {
    if (e.touches[0].clientY - ty > 60) closeBS();
  }, {passive:true});
  overlay.addEventListener('wheel', e => { if (e.deltaY > 0) closeBS(); }, {passive:true});
  overlay.addEventListener('click', e => { if (e.target === overlay) closeBS(); });
});
</script>
